<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aron Wolfson - Lift Tracker</title>
    <!-- Tailwind CSS for modern, ultra-clean design -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Inter Font for sleek premium typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #ffffff;
        }
        /* Custom toggle switch styles for a premium look */
        .toggle-bg {
            transition: background-color 0.2s ease, border-color 0.2s ease;
        }
        .toggle-dot {
            transition: transform 0.2s ease;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6 bg-white selection:bg-neutral-200">

    <div class="w-full max-w-2xl flex flex-col items-center">
        
        <!-- Minimalist Lift Selectors (Pure White / Stark Black) -->
        <div class="flex flex-wrap justify-center gap-4 mb-8">
            <button 
                id="btn-bench" 
                onclick="setLift('bench')" 
                class="px-6 py-3 text-sm font-semibold tracking-wide border-2 border-black rounded-lg transition-all duration-200 bg-black text-white hover:bg-neutral-900 focus:outline-none">
                Bench Press
            </button>
            <button 
                id="btn-squat" 
                onclick="setLift('squat')" 
                class="px-6 py-3 text-sm font-semibold tracking-wide border-2 border-black rounded-lg transition-all duration-200 bg-white text-black hover:bg-neutral-100 focus:outline-none">
                Squat
            </button>
            <button 
                id="btn-deadlift" 
                onclick="setLift('deadlift')" 
                class="px-6 py-3 text-sm font-semibold tracking-wide border-2 border-black rounded-lg transition-all duration-200 bg-white text-black hover:bg-neutral-100 focus:outline-none">
                Deadlift
            </button>
        </div>

        <!-- Category Segmented Control (All-Time Max vs. Recorded) -->
        <div class="mb-8 flex items-center justify-center bg-neutral-100 p-1 rounded-xl w-72 border border-neutral-200">
            <button 
                id="btn-cat-max" 
                onclick="setCategory('max')" 
                class="flex-1 text-xs py-2 px-3 font-semibold rounded-lg transition-all duration-200 bg-white text-neutral-900 shadow-sm focus:outline-none">
                All-Time Max
            </button>
            <button 
                id="btn-cat-recorded" 
                onclick="setCategory('recorded')" 
                class="flex-1 text-xs py-2 px-3 font-semibold rounded-lg transition-all duration-200 text-neutral-500 hover:text-neutral-900 focus:outline-none">
                Recorded
            </button>
        </div>

        <!-- Leaderboard Display Container -->
        <div class="w-full bg-white border border-neutral-200 rounded-xl overflow-hidden shadow-sm transition-all duration-300">
            
            <div class="px-6 py-5 border-b border-neutral-100 flex justify-between items-center bg-neutral-50/50">
                <h2 id="leaderboard-title" class="text-sm font-bold tracking-wider uppercase text-neutral-800">Bench Press Leaderboard</h2>
                <span id="category-badge" class="text-xs bg-black text-white font-semibold px-3 py-1 rounded-full uppercase tracking-wider">All-Time Max</span>
            </div>

            <!-- Table View -->
            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm">
                    <thead>
                        <tr class="bg-neutral-50/70 border-b border-neutral-100 text-neutral-500 font-medium">
                            <th class="py-3.5 px-6 w-16">Rank</th>
                            <th class="py-3.5 px-4">Lifter</th>
                            <th class="py-3.5 px-4 text-right">Bodyweight</th>
                            <th class="py-3.5 px-4 text-right">Lift Weight</th>
                            <th class="py-3.5 px-6 text-right">Ratio</th>
                        </tr>
                    </thead>
                    <tbody id="leaderboard-rows" class="divide-y divide-neutral-100">
                        <!-- Dynamic rows will be inserted here -->
                    </tbody>
                </table>
            </div>

            <!-- Empty State -->
            <div id="empty-state" class="hidden py-16 text-center text-neutral-400 text-sm font-medium">
                No entries available for this selection yet.
            </div>

        </div>
    </div>

    <script>
        // State management
        let currentLift = 'bench'; // 'bench' | 'squat' | 'deadlift'
        let currentCategory = 'max'; // 'max' | 'recorded'

        // Database
        const liftData = {
            bench: {
                max: [
                    { rank: 1, name: "Aron Wolfson", bodyweight: 195, lift: 310 }
                ],
                recorded: [
                    { rank: 1, name: "Aron Wolfson", bodyweight: 194, lift: 300 }
                ]
            },
            squat: {
                max: [],
                recorded: []
            },
            deadlift: {
                max: [],
                recorded: []
            }
        };

        function setLift(lift) {
            currentLift = lift;
            updateUI();
        }

        function setCategory(category) {
            currentCategory = category;
            updateUI();
        }

        function updateUI() {
            // Update Top Navigation Buttons (Lifts)
            const liftButtons = {
                bench: document.getElementById('btn-bench'),
                squat: document.getElementById('btn-squat'),
                deadlift: document.getElementById('btn-deadlift')
            };

            Object.keys(liftButtons).forEach(key => {
                const btn = liftButtons[key];
                if (key === currentLift) {
                    btn.classList.add('bg-black', 'text-white', 'border-black');
                    btn.classList.remove('bg-white', 'text-black');
                } else {
                    btn.classList.remove('bg-black', 'text-white');
                    btn.classList.add('bg-white', 'text-black');
                }
            });

            // Update Segmented Category Control Buttons
            const btnMax = document.getElementById('btn-cat-max');
            const btnRecorded = document.getElementById('btn-cat-recorded');

            if (currentCategory === 'max') {
                btnMax.classList.add('bg-white', 'text-neutral-900', 'shadow-sm');
                btnMax.classList.remove('text-neutral-500', 'hover:text-neutral-900');
                
                btnRecorded.classList.remove('bg-white', 'text-neutral-900', 'shadow-sm');
                btnRecorded.classList.add('text-neutral-500', 'hover:text-neutral-900');
            } else {
                btnRecorded.classList.add('bg-white', 'text-neutral-900', 'shadow-sm');
                btnRecorded.classList.remove('text-neutral-500', 'hover:text-neutral-900');
                
                btnMax.classList.remove('bg-white', 'text-neutral-900', 'shadow-sm');
                btnMax.classList.add('text-neutral-500', 'hover:text-neutral-900');
            }

            // Update Header Title and Badge
            const liftLabels = {
                bench: "Bench Press",
                squat: "Squat",
                deadlift: "Deadlift"
            };
            const catLabels = {
                max: "All-Time Max",
                recorded: "Recorded"
            };

            document.getElementById('leaderboard-title').textContent = `${liftLabels[currentLift]} Leaderboard`;
            document.getElementById('category-badge').textContent = catLabels[currentCategory];

            // Render Table Data
            renderTable();
        }

        function renderTable() {
            const tableRowsContainer = document.getElementById('leaderboard-rows');
            const emptyStateContainer = document.getElementById('empty-state');
            const tableElement = tableRowsContainer.closest('table');
            
            const entries = liftData[currentLift][currentCategory];

            if (entries.length === 0) {
                tableRowsContainer.innerHTML = '';
                tableElement.classList.add('hidden');
                emptyStateContainer.classList.remove('hidden');
            } else {
                emptyStateContainer.classList.add('hidden');
                tableElement.classList.remove('hidden');

                let htmlContent = '';
                entries.forEach(entry => {
                    const ratio = (entry.lift / entry.bodyweight).toFixed(2);
                    htmlContent += `
                        <tr class="hover:bg-neutral-50/50 transition-colors">
                            <td class="py-4 px-6 font-bold text-neutral-900">${entry.rank}</td>
                            <td class="py-4 px-4 font-semibold text-neutral-900">${entry.name}</td>
                            <td class="py-4 px-4 text-right text-neutral-600">${entry.bodyweight} lbs</td>
                            <td class="py-4 px-4 text-right font-bold text-black">${entry.lift} lbs</td>
                            <td class="py-4 px-6 text-right font-semibold text-emerald-600">${ratio}x</td>
                        </tr>
                    `;
                });
                tableRowsContainer.innerHTML = htmlContent;
            }
        }

        // Initialize display on window load
        window.onload = function() {
            updateUI();
        };
    </script>
</body>
</html>
